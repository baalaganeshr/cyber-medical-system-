<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Registration</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/web3@1.2.8/dist/web3.js"></script>
    <script src="web3-config.js"></script>
</head>
<body>

    <header>
        <h1>Cyber Medical System</h1>
    </header>

    <nav>
        <a href="hospital.html">Hospital Registration</a>
        <a href="doctor.html">Doctor Registration</a>
        <a href="patient.html">Patient Registration</a>
        <a href="patient_details.html">View Patient Details</a>
        <a href="record_details.html">View Medical Record</a>
        <a href="examine_details.html">View Patient Examine Details</a>
    </nav>

    <div class="container">
        <h2>Register Patient</h2>
        <form id="patientForm">
            <div class="form-group">
                <label for="patientId">Patient ID:</label>
                <input type="number" id="patientId" required>
            </div>
            <div class="form-group">
                <label for="patientName">Name:</label>
                <input type="text" id="patientName" required>
            </div>
            <div class="form-group">
                <label for="patientAge">Age:</label>
                <input type="number" id="patientAge" required>
            </div>
            <div class="form-group">
                <label for="patientGender">Gender:</label>
                <input type="text" id="patientGender" required>
            </div>
            <div class="form-group">
                <label for="patientHeight">Height:</label>
                <input type="text" id="patientHeight" required>
            </div>
            <div class="form-group">
                <label for="patientWeight">Weight:</label>
                <input type="number" id="patientWeight" required>
            </div>
            <div class="form-group">
                <label for="patientAddress">Address:</label>
                <input type="text" id="patientAddress" required>
            </div>
            <div class="form-group">
                <label for="patientPhone">Phone:</label>
                <input type="text" id="patientPhone" required>
            </div>
            <div class="form-group">
                <label for="patientEmail">Email:</label>
                <input type="email" id="patientEmail" required>
            </div>
            <div class="form-group">
                <label for="patientDate">Date:</label>
                <input type="date" id="patientDate" required>
            </div>

            <h3>Attendant Details</h3>
            <div class="form-group">
                <label for="attendantName">Attendant Name:</label>
                <input type="text" id="attendantName" required>
            </div>
            <div class="form-group">
                <label for="attendantRelation">Relation:</label>
                <input type="text" id="attendantRelation" required>
            </div>
            <div class="form-group">
                <label for="attendantPhone">Attendant Phone:</label>
                <input type="text" id="attendantPhone" required>
            </div>

            <button type="submit">Register Patient & Attendant</button>
        </form>

        <div id="status"></div>
    </div>

    <script>
        document.getElementById('patientForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('patientId').value;
            const name = document.getElementById('patientName').value;
            const age = document.getElementById('patientAge').value;
            const gender = document.getElementById('patientGender').value;
            const height = document.getElementById('patientHeight').value;
            const weight = document.getElementById('patientWeight').value;
            const address = document.getElementById('patientAddress').value;
            const phone = document.getElementById('patientPhone').value;
            const email = document.getElementById('patientEmail').value;
            const date = document.getElementById('patientDate').value;
            
            const attendantName = document.getElementById('attendantName').value;
            const attendantRelation = document.getElementById('attendantRelation').value;
            const attendantPhone = document.getElementById('attendantPhone').value;

            try {
                const accounts = await web3.eth.getAccounts();
                
                // Store Patient Details
                await patientContract.methods.store_patient_details(
                    id, name, age, gender, height, weight, address, phone, email, date
                ).send({ from: accounts[0], gas: 500000 });

                // Store Attendant Details
                await patientContract.methods.store_attendant_details(
                    id, attendantName, attendantRelation, attendantPhone
                ).send({ from: accounts[0], gas: 500000 });

                document.getElementById('status').innerText = 'Patient & Attendant details registered successfully!';
                document.getElementById('patientForm').reset();
            } catch (error) {
                console.error(error);
                document.getElementById('status').innerText = 'Error registering patient. Check console.';
            }
        });
    </script>
</body>
</html>
